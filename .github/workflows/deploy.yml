name: CI/CD Pipeline - Build and Deploy
 
  on:
    push:
      branches: [ main ]
 
  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest
 
      steps:
        - name: Checkout code
          uses: actions/checkout@v3
 
        - name: Build Docker image
          run: docker build -t cicd-demo-app .
 
        - name: Deploy to AWS EC2
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              docker stop cicd-app 2>/dev/null || true
              docker rm cicd-app 2>/dev/null || true
              docker rmi cicd-demo-app 2>/dev/null || true
              cd /home/ubuntu
              rm -rf app
              git clone https://github.com/Vamshikanagandla/cicd-pipeline-demo.git app
              cd app
              docker build -t cicd-demo-app .
              docker run -d --name cicd-app -p 80:5000 --restart always cicd-demo-app
              echo "Deployment complete!"
